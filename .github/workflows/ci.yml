name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Quality Gates (lint + typecheck + build + unit-test + coverage) ───
  quality:
    uses: ./.github/workflows/_quality.yml
    with:
      node_version: '22'
      coverage_tier: unit

  # ═══════════════════════════════════════════════════════════════════════
  # GitHub Pages — publish API docs + coverage on push to master
  # Quality gate must pass before deployment.
  # ═══════════════════════════════════════════════════════════════════════
  deploy-pages:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # ── Generate TypeDoc API docs ──────────────────────────────────────
      - name: Generate API documentation
        run: pnpm docs:generate 2>/dev/null || echo "[pages] TypeDoc not configured — skipping API docs"

      # ── Download coverage artifact from this workflow run ─────────────
      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: docs/coverage
        continue-on-error: true

      # ── Deploy to GitHub Pages ────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy (transient error)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Collect page URL
        id: deployment
        if: always()
        run: |
          if [ "${{ steps.deploy1.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy1.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deploy2.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy2.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "Page deployment failed after retry" >&2
            exit 1
          fi
