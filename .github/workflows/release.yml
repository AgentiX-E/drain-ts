name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Quality Gates ────────────────────────────────────────────────
  quality:
    uses: ./.github/workflows/_quality.yml
    with:
      node_version: '22'
      coverage_tier: unit

  # ─── npm Publish (OIDC Trusted Publisher) ─────────────────────────
  publish:
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish to npm (OIDC Trusted Publisher)
        run: |
          # npm OIDC publishes via the ambient GITHUB_OIDC_TOKEN
          # --provenance adds sigstore signing (requires first publish without it
          # for brand-new packages in scoped registries)
          npm publish --access public
        env:
          NPM_CONFIG_PROVENANCE: true

  # ─── GitHub Release ───────────────────────────────────────────────
  github-release:
    needs: [publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Create GitHub Release
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "$GITHUB_REF" ]; then
            TAG_NAME="v1.0.0"
          fi

          gh release create "$TAG_NAME" \
            --title "drain-ts $TAG_NAME" \
            --notes "## drain-ts $TAG_NAME

          **@agentix-e/drain-ts** — TypeScript/Node.js streaming log template miner.

          ### Highlights
          - Full Drain3 v0.9.11 parity: treeSearch, fastMatch, LRU eviction, match inference, parameter extraction
          - 184 tests, 98.86% statement coverage, 95.5% branch coverage
          - Zero runtime dependencies — no mandatory peer deps
          - Framework-agnostic state persistence (File, Redis, Kafka, S3)
          - Cross-runtime: Node.js ≥22, Deno, Bun, browsers

          ### Installation
          \`\`\`bash
          pnpm add @agentix-e/drain-ts
          \`\`\`

          See [documentation](https://agentix-e.github.io/drain-ts/) and [README](https://github.com/AgentiX-E/drain-ts#readme) for full details."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
